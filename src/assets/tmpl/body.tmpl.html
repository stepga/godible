<body>

	<!--TODO: via `$('.alert').eq(0).toggle(false)` `display:none` is toggled, $().alert('close') would remove the alert from the DOM-->
	<div id="alertBox" class="alert alert-danger alert-top-sticky" role="alert" style="display:none;">
		<span id="alertBoxCloseBtn" class="closebtn">&times;</span>
		<strong>Lerne RFID-UID für:</strong>
		<span id="alertBoxTrackName">Track Name</span>
		(noch <span id="alertBoxSeconds">10</span>s)
	</div>

	<!--mt-5: margin-top-5, size 5 == $spacer * 3, with sizes ranging from 0 to 5 (see https://getbootstrap.com/docs/5.3/utilities/spacing/)-->
	<div id ="playerUI" class="container-fluid text-center mt-5">

		<div class="row">
			<div class="col-2">
				<span id="time_current">00:00</span>
			</div>
			<div class="col-8">
				<p id="title" class="fw-bold fst-italic">Track Name</span></p>
			</div>
			<div class="col-2">
				<span id="time_total">00:00</span>
			</div>
		</div>

		<div class="row">
			<div class="col">
				<input type="range" class="form-range" min="0" max="100" id="slider">
			</div>
		</div>

		<br>

		<div class="row">
			<div class="btn-group" role="group" aria-label="Basic outlined example">
				<!--p-4: padding, size 4 == $spacer * 1.5-->
				<button id="previous" type="button" class="btn btn-primary p-4">
					<i class="fa fa-arrow-left"></i>
				</button>
				<button id="toggle" type="button" class="btn btn-primary p-4 ms-1">
					<!--the class of this button is dynamically changed after a successfull press-->
					<i class="fa fa-play"></i>
				</button>
				<button id="next" type="button" class="btn btn-primary p-4 ms-1">
					<i class="fa fa-arrow-right"></i>
				</button>
			</div>
		</div>
	</div>

	<div class="container-fluid mt-5">
		<input class="form-control" id="filterInput" type="text" placeholder="Filter die Einträge..">
		<table class="table table-bordered table-striped table-hover mt-3">
			<thead>
				<tr>
					<th>Dateiname</th>
					<th class="text-center">Position</th>
					<th class="text-center">RFID-Tag</th>
				</tr>
			</thead>
		</table>
	</div>

	<script type="text/javascript" src="js/script.js"></script>
</body>
</html>
