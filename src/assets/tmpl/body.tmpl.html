<body>

	<!--mt-5: margin-top-5, size 5 == $spacer * 3, with sizes ranging from 0 to 5 (see https://getbootstrap.com/docs/5.3/utilities/spacing/)-->
	<div class="container-fluid text-center mt-5">

		<div class="row">
			<div class="col-2">
				00:00
			</div>
			<div class="col-8">
				<p id="title" class="fw-bold fst-italic">Foo Bar Track Name</span></p>
			</div>
			<div class="col-2">
				06:12
			</div>
		</div>

		<div class="row">
			<div class="col">
				<input type="range" class="form-range" min="0" max="100" id="range2">
			</div>
		</div>

		<br>

		<div class="row">
			<div class="btn-group" role="group" aria-label="Basic outlined example">
				<!--p-4: padding, size 4 == $spacer * 1.5-->
				<button type="button" class="btn btn-primary p-4">
					<i class="fa fa-arrow-left"></i>
				</button>
				<button type="button" class="btn btn-primary p-4 ms-1">
					<!--the class of this button is dynamically changed after a successfull press-->
					<i class="fa fa-play"></i>
				</button>
				<button type="button" class="btn btn-primary p-4 ms-1">
					<i class="fa fa-arrow-right"></i>
				</button>
			</div>
		</div>
	</div>

	<div class="wrapper" style="display:none;">
		<header class="header">
			<p>Es läuft: <span id="title" style="font-weight:bold">XXX</span></p>
			<div class="slidecontainer">
				<span id="time_current">00:00</span>
				<input type="range" min="0" max="100" value="0" class="slider" id="slider">
				<span id="time_total">00:00</span>
			</div>
		</header>

		<aside class="aside aside-1">
			<button id="previous" type="button" style="width: 20%; height: 20%;">
				<embed src="img/Font_Awesome_5_regular_arrow-alt-circle-left.svg">
			</button>
		</aside>

		<aside class="aside aside-2">
			<button id="toggle" type="button" style="width: 20%; height: 20%;">
				<embed src="img/Font_Awesome_5_regular_play-circle.svg">
			</button>
		</aside>

		<aside class="aside aside-3">
			<button id="next" type="button" style="width: 20%; height: 20%;">
				<embed src="img/Font_Awesome_5_regular_arrow-alt-circle-right.svg">
			</button>
		</aside>
	</div>


	<div style="display:none;" id="alertBox" class="alert">
		<span id="alertBoxCloseBtn" class="closebtn">&times;</span>
		<strong>Lerne RFID-UID für:</strong>
		<span id="alertBoxTrackName"></span>
		(noch <span id="alertBoxSeconds">10</span>s)
	</div>

	<table style="display:none;">
		<thead>
			<tr>
				<th>Dateiname</th>
				<th>Position/Gesamtdauer (Sekunden)</th>
				<th colspan="1">RFID UID</th>
			</tr>
		</thead>
	</table>

	<div class="container-fluid mt-5">
		<input class="form-control" id="myInput" type="text" placeholder="Search..">
		<table class="table table-bordered table-striped table-hover mt-3">
			<thead>
				<tr>
					<th>Dateiname</th>
					<th>Position</th>
					<th>RFID-Tag</th>
				</tr>
			</thead>
			<tbody class="demoClassName table-group-divider" id="myTable1">
				<tr>
					<th colspan=2>/ordner/disc_1</th>
					<td>
						<button
							data-basename="disc_1"
							data-fullpath="/ordner/disc_1"
							class="btn btn-warning mb-1"
							type="button">
							<i class="fa fa-wifi"></i>
						</button>
					</td>
				</tr>
				<tr>
					<td>01 Xyz</td>
					<td>0/21</td>
					<td>
						<button
							data-basename="01 Xyz"
							data-fullpath="/ordner/disc_1/01 Xyz"
							class="btn btn-warning mb-1"
							type="button">
							<i class="fa fa-wifi"></i>
						</button>
					</td>
				</tr>
				<tr>
					<td>02 Long Ass Name Foo Bar</td>
					<td>112/772</td>
					<td>
						<button
							data-basename="02 Long Ass Name Foo Bar"
							data-fullpath="/ordner/disc_1/02 Long Ass Name Foo Bar"
							class="btn btn-warning mb-1"
							type="button">
							<i class="fa fa-wifi">9a083b11</i>
						</button>
					</td>
				</tr>
			</tbody>

			<tbody class="demoClassName table-group-divider" id="myTable2">
				<tr>
					<th colspan=2>/ordner/disc_2</th>
					<td>
						<button
							data-basename="disc_2"
							data-fullpath="/ordner/disc_2"
							class="btn btn-warning mb-1"
							type="button">
							<i class="fa fa-wifi"></i>
						</button>
					</td>
				</tr>
				<tr>
					<td>05 Foo</td>
					<td>0/211</td>
					<td>
						<button
							data-basename="05 Foo"
							data-fullpath="/ordner/disc_2/05 Foo"
							class="btn btn-warning mb-1"
							type="button">
							<i class="fa fa-wifi">fb983b06</i>
						</button>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<button type="button" class="btn btn-primary">Primary</button>
	<br>
	<br>

	<script type="text/javascript" src="js/script.js"></script>
	<script>
$(document).ready(function(){
	$("#myInput").on("keyup", function() {
		var value = $(this).val().toLowerCase();
		$("tbody[class*='demoClassName'] tr").filter(function() {
			// test if containing dir matches
			var dirMatch = $(this).parent().find('tr').eq(0).text().toLowerCase();
			var dirMatchIdx = dirMatch.indexOf(value);
			if (dirMatchIdx > -1) {
				$(this).toggle(true);
				return;
			}
			// test if actual row matches
			var rowMatch = $(this).text().toLowerCase();
			var rowMatchIdx = rowMatch.indexOf(value);
			$(this).toggle(rowMatchIdx > -1);
		});
	});
});
	</script>
</body>
</html>
